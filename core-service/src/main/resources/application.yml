server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: core-service
  datasource:
    url: jdbc:mysql://localhost:3306/iatech_core?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Configuration du stockage (utilisée par FileStorageService)
file:
  upload-dir: uploads/

eureka:
  client:
    service-url:
      defaultZone: http://user:password@localhost:8761/eureka/
    enabled: true
    register-with-eureka: true
    fetch-registry: true


  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: false
    secure-port-enabled: false
    non-secure-port-enabled: true

    status-page-url: http://${eureka.instance.hostname}:${eureka.instance.secure-port}/actuator/info
    health-check-url: http://${eureka.instance.hostname}:${eureka.instance.secure-port}/actuator/health
    home-page-url: http://${eureka.instance.hostname}:${eureka.instance.secure-port}/

    metadata-map:
      zone: zone1
      version: 1.0.0
      profile: dev

    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 60
springdoc:
  api-docs:
    path: /api/v3/api-docs

iatechnology:
  app:
    jwtSecret: "======================IA_TECHNOLOGY_SECRET_KEY_FOR_JWT_GENERATION_AND_VALIDATION_WHICH_SHOULD_BE_VERY_LONG======================"
    jwtExpirationMs: 86400000
